version: '3.8'

services:
  # [1] NestJS 백엔드 애플리케이션
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: agent-backend
    ports:
      - '3000:3000'
    volumes:
      # 로컬의 소스코드를 컨테이너 내부에 마운트 (핫 리로딩의 핵심)
      - .:/usr/src/app
      # 컨테이너 내부의 node_modules는 덮어쓰지 않도록 격리
      - /usr/src/app/node_modules
    depends_on:
      - postgres-db
      - mongo-db
    networks:
      - agent-network

  # [2] PostgreSQL (정형 메타데이터 저장용)
  postgres-db:
    image: postgres:15-alpine
    container_name: agent-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${RDB_USER}
      POSTGRES_PASSWORD: ${RDB_PASSWORD}
      POSTGRES_DB: ${RDB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - agent-network

  # [3] MongoDB (AI 비정형 초안 저장용)
  mongo-db:
    image: mongo:6.0
    container_name: agent-mongo
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo-data:/data/db
    networks:
      - agent-network

# DB 데이터 영속성(Persistence)을 위한 볼륨 선언
volumes:
  postgres-data:
  mongo-data:

networks:
  agent-network:
    driver: bridge